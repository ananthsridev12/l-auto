<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connect LinkedIn — Scheduler</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="centered-page">
<div class="auth-card">
  <div class="auth-logo">
    <svg viewBox="0 0 24 24" fill="#0A66C2" width="40" height="40"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
  </div>

  {% if token %}
  <h1>Connected</h1>
  <p class="subtitle">Signed in as <strong>{{ token.name }}</strong></p>
  <a href="/today" class="btn-primary" style="display:block;text-align:center;text-decoration:none;">Go to Today's Post →</a>
  <a href="/auth/logout" class="link-muted" style="display:block;text-align:center;margin-top:16px;">Sign out and reconnect</a>
  {% else %}
  <h1>Connect your LinkedIn</h1>
  <p class="subtitle">Click below to sign in with LinkedIn. You'll be redirected back automatically.</p>
  <a href="/auth/start" class="btn-linkedin">
    <svg viewBox="0 0 24 24" fill="white" width="20" height="20"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    Sign in with LinkedIn
  </a>
  <a href="/setup" class="link-muted" style="display:block;text-align:center;margin-top:20px;">← Back to Settings</a>
  {% endif %}
</div>
</body>
</html>
