<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Setup — LinkedIn Scheduler</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="centered-page">
<div class="auth-card">
  <div class="auth-logo">
    <svg viewBox="0 0 24 24" fill="#0A66C2" width="40" height="40"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
  </div>
  <h1>LinkedIn Scheduler</h1>
  <p class="subtitle">Enter your LinkedIn Developer App credentials to get started.</p>

  <form method="POST" action="/setup">
    <div class="form-group">
      <label>Client ID</label>
      <input type="text" name="client_id" value="{{ settings.get('client_id','') }}" placeholder="86xxxxxxxx" required>
    </div>
    <div class="form-group">
      <label>Client Secret</label>
      <input type="password" name="client_secret" value="{{ settings.get('client_secret','') }}" placeholder="WPL_AP1.xxxxxxxx" required>
    </div>
    <div class="form-group">
      <label>Content Folder Path <span class="optional">(optional)</span></label>
      <input type="text" name="content_dir" value="{{ settings.get('content_dir','') }}" placeholder="Leave blank to use the content/ folder inside this app">
      <div class="hint">Put your CSV and output/ slides folder here.</div>
    </div>

    <div class="redirect-notice">
      <strong>Important:</strong> Add this Redirect URL to your LinkedIn Developer App:
      <code>{{ redirect_uri }}</code>
    </div>

    <button type="submit" class="btn-primary">Save & Connect LinkedIn →</button>
  </form>
</div>
</body>
</html>
